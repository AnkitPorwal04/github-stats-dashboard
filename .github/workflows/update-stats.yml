name: Update GitHub stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "src/**"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stats
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: node scripts/fetch-stats.mjs

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/stats.json docs/assets/stats.svg docs/assets/top-langs.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update GitHub stats [skip ci]"
            git push
          fi
