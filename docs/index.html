<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Stats Dashboard</title>
  <meta name="description" content="A self-hosted GitHub statistics dashboard." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="container">
    <header class="profile" id="profile">
      <img id="avatar" class="avatar" alt="" width="96" height="96" />
      <div class="profile-meta">
        <h1 id="name">Loading…</h1>
        <a id="login" class="login" href="#" target="_blank" rel="noopener"></a>
        <p id="bio" class="bio"></p>
        <div class="badges">
          <span class="badge" id="followers-badge"></span>
          <span class="badge" id="repos-badge"></span>
          <span class="badge" id="since-badge"></span>
        </div>
      </div>
    </header>

    <section class="stat-grid" id="stat-grid" aria-label="Key statistics"></section>

    <section class="charts">
      <div class="card chart-card">
        <h2>Contributions timeline</h2>
        <canvas id="timelineChart" height="140"></canvas>
      </div>
      <div class="card chart-card">
        <h2>Top languages</h2>
        <canvas id="langChart" height="140"></canvas>
      </div>
    </section>

    <section class="card">
      <h2>Embeddable cards</h2>
      <p class="muted">These SVGs are regenerated by the scheduled workflow — embed them in any README.</p>
      <div class="embeds">
        <img class="embed" src="./assets/stats.svg" alt="GitHub stats card" loading="lazy" />
        <img class="embed" src="./assets/top-langs.svg" alt="Top languages card" loading="lazy" />
      </div>
    </section>

    <section class="card" id="repos-card">
      <h2>Top repositories</h2>
      <div class="repo-grid" id="repo-grid"></div>
    </section>

    <footer class="footer">
      <span id="updated" class="muted"></span>
      <span class="muted">·</span>
      <a href="https://github.com/anuraghazra/github-readme-stats" target="_blank" rel="noopener" class="muted">self-hosted stats</a>
    </footer>
  </main>

  <div id="error" class="error hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
