<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Stats Dashboard</title>
  <meta name="description" content="A self-hosted GitHub statistics dashboard." />
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <div class="grid-overlay"></div>
  </div>

  <main class="container">
    <header class="hero reveal" id="profile">
      <div class="avatar-wrap">
        <img id="avatar" class="avatar" alt="" width="120" height="120" />
        <span class="avatar-ring" aria-hidden="true"></span>
      </div>
      <div class="hero-meta">
        <h1 id="name">Loading…</h1>
        <a id="login" class="login" href="#" target="_blank" rel="noopener"></a>
        <p id="bio" class="bio"></p>
        <div class="badges">
          <span class="badge" id="followers-badge"></span>
          <span class="badge" id="following-badge"></span>
          <span class="badge" id="repos-badge"></span>
          <span class="badge" id="since-badge"></span>
        </div>
      </div>
    </header>

    <section class="stat-grid reveal" id="stat-grid" aria-label="Key statistics"></section>

    <section class="card reveal" id="heatmap-card">
      <div class="card-head">
        <h2>Contribution activity</h2>
        <span class="muted" id="heatmap-total"></span>
      </div>
      <div class="heatmap-scroll">
        <div class="heatmap" id="heatmap" role="img" aria-label="Contribution heatmap"></div>
      </div>
      <div class="heatmap-legend">
        <span class="muted">Less</span>
        <span class="hm-cell l0"></span>
        <span class="hm-cell l1"></span>
        <span class="hm-cell l2"></span>
        <span class="hm-cell l3"></span>
        <span class="hm-cell l4"></span>
        <span class="muted">More</span>
      </div>
    </section>

    <section class="charts">
      <div class="card chart-card reveal">
        <div class="card-head"><h2>Monthly contributions</h2></div>
        <canvas id="timelineChart" height="150"></canvas>
      </div>
      <div class="card chart-card reveal">
        <div class="card-head"><h2>Top languages</h2></div>
        <div class="lang-layout">
          <canvas id="langChart" height="150"></canvas>
          <ul class="lang-list" id="lang-list"></ul>
        </div>
      </div>
    </section>

    <section class="card reveal" id="repos-card">
      <div class="card-head"><h2>Top repositories</h2></div>
      <div class="repo-grid" id="repo-grid"></div>
    </section>

    <section class="card reveal">
      <div class="card-head">
        <h2>Embeddable cards</h2>
        <button class="copy-btn" id="copy-embed" type="button">Copy README embed</button>
      </div>
      <p class="muted">Regenerated by the scheduled workflow — drop them into any README.</p>
      <div class="embeds">
        <img class="embed" src="./assets/stats.svg" alt="GitHub stats card" loading="lazy" />
        <img class="embed" src="./assets/top-langs.svg" alt="Top languages card" loading="lazy" />
      </div>
    </section>

    <footer class="footer">
      <span id="updated" class="muted"></span>
      <span class="dot">·</span>
      <a id="repo-link" href="#" target="_blank" rel="noopener" class="muted">source</a>
    </footer>
  </main>

  <div id="toast" class="toast hidden"></div>
  <div id="error" class="error hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
