<svg width="320" height="185" viewBox="0 0 320 185" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Most used languages">
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #6c63ff; }
    .lang { font: 400 12px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #808080; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; } }
    .stagger { opacity: 0; animation: slideIn 0.45s ease-in-out forwards; }
    .fade { opacity: 0; animation: fadeIn 0.8s ease-in-out forwards; }
  </style>
  <rect x="0.5" y="0.5" rx="6" width="319" height="184" fill="transparent" stroke="transparent"/>
  <text x="25" y="35" class="header fade">Most Used Languages</text>
