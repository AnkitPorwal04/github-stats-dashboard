<svg width="620" height="380" viewBox="0 0 620 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Most used languages">
  <style>
    .header { font: 600 19px 'Segoe UI', Ubuntu, Sans-Serif; fill: #6c63ff; }
    .lang { font: 400 13px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #808080; }
    .pct { font-weight: 600; fill: #b9c0cc; }
    .seg { opacity: 0; animation: fadeIn 0.7s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; } }
    .stagger { opacity: 0; animation: slideIn 0.45s ease-in-out forwards; }
    .fade { opacity: 0; animation: fadeIn 0.8s ease-in-out forwards; }
  </style>
  <rect x="0.5" y="0.5" rx="6" width="619" height="379" fill="transparent" stroke="transparent"/>
  <text x="25" y="38" class="header fade">Most Used Languages</text>
