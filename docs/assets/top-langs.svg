      class="seg" style="animation-delay:770ms" /><circle cx="95" cy="120" r="52" fill="none" stroke="#34d399" stroke-width="20"
      stroke-dasharray="12.45 314.27" stroke-dashoffset="-311.77"
      class="seg" style="animation-delay:900ms" /></g>
  <text x="95" y="117" text-anchor="middle" class="center-pct">38%</text>
  <text x="95" y="135" text-anchor="middle" class="center-lang">CSS</text>
  
    <g class="stagger" style="animation-delay:450ms" transform="translate(190, 68)">
      <circle cx="6" cy="-4" r="5.5" fill="#8b7bff"/>
