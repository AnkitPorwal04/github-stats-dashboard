      class="seg" style="animation-delay:250ms" /><circle cx="95" cy="120" r="52" fill="none" stroke="#22d3ee" stroke-width="20"
      stroke-dasharray="57.71 269.02" stroke-dashoffset="-123.28"
      class="seg" style="animation-delay:380ms" /><circle cx="95" cy="120" r="52" fill="none" stroke="#f6c945" stroke-width="20"
